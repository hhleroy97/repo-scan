name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev deps (pytest, syrupy, radon, lizard)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install madge (TS dependency graphs)
        run: npm install -g madge

      - name: Lint import layer contracts
        run: lint-imports

      - name: Run tests
        run: pytest tests/ -q
